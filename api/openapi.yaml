openapi: 3.0.3
info:
  title: gowallet API
  version: 0.1.0
  description: Loyalty points wallet — accounts earn/spend points with correct balances.
servers:
  - url: http://localhost:8080

# Global default: every operation needs a Bearer JWT. Public routes opt out
# per-operation with `security: []`. Spec-first, this means any new path is
# protected by default — you have to *explicitly* open one up.
security:
  - bearerAuth: []

paths:
  /login:
    post:
      operationId: login
      summary: Exchange account credentials for a signed HS256 JWT (role from the stored account).
      tags: [auth]
      security: []          # public — you can't require a token to get a token
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Authenticated — a signed Bearer token whose role is the stored account's role.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TokenResponse' }
        '400':
          description: Malformed JSON body.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }
        '401':
          description: >
            Invalid credentials. Returned IDENTICALLY for a wrong secret AND an unknown account —
            the body never reveals which, so accounts can't be enumerated.
          content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } }

  /healthz:
    get:
      operationId: getHealth
      summary: Liveness + database readiness probe
      tags: [meta]
      security: []
      responses:
        '200':
          description: Service healthy and database reachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        '503':
          description: Database unreachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }

  /accounts:
    get:
      operationId: listAccounts
      summary: List all accounts with their derived balance (admin only)
      tags: [accounts]
      responses:
        '200':
          description: All accounts, each with its current derived balance.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AccountList' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createAccount
      summary: Create a member account
      tags: [accounts]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NewAccount' }
      responses:
        '201':
          description: Account created.
          headers:
            Location: { schema: { type: string }, description: URL of the new account }
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
          links:
            GetAccount:
              operationId: getAccount
              parameters: { account_id: '$response.body#/account_id' }
            GetBalance:
              operationId: getBalance
              parameters: { account_id: '$response.body#/account_id' }
        '400': { description: Malformed body., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { description: account_id already exists., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /accounts/{account_id}:
    get:
      operationId: getAccount
      summary: Read one account
      tags: [accounts]
      parameters:
        - { name: account_id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 64, pattern: '^[A-Za-z0-9._-]+$' } }
      responses:
        '200':
          description: The account.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Account' }
        '400': { description: Malformed account_id in the path., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No such account., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /accounts/{account_id}/balance:
    get:
      operationId: getBalance
      summary: Current balance for an account
      tags: [accounts]
      parameters:
        - { name: account_id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 64, pattern: '^[A-Za-z0-9._-]+$' } }
      responses:
        '200':
          description: The current balance.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Balance' }
        '400': { description: Malformed account_id in the path., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No such account., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /accounts/{account_id}/transactions:
    get:
      operationId: listTransactions
      summary: List an account's transactions, newest-first (member-own / admin-any)
      tags: [transactions]
      parameters:
        - { name: account_id, in: path, required: true, schema: { type: string, minLength: 1, maxLength: 64, pattern: '^[A-Za-z0-9._-]+$' } }
      responses:
        '200':
          description: The account's ledger, newest-first.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TransactionList' }
        '400': { description: Malformed account_id in the path., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: No such account., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }

  /transactions:
    post:
      operationId: createTransaction
      summary: Record an earn transaction (idempotent on ref)
      tags: [transactions]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/NewTransaction' }
      responses:
        '201':
          description: Transaction recorded.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Transaction' }
        '200':
          description: Idempotent replay — the existing transaction for this ref.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Transaction' }
        '400': { description: Malformed body or kind not allowed., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: account_id does not exist., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '409':
          description: Spend rejected — would drive the balance below zero.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Error' }

  /batch:
    post:
      operationId: ingestBatch
      summary: Ingest a CSV of transactions (admin only); idempotent on ref, returns a summary
      tags: [batch]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              additionalProperties: false
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: >
                    CSV with header `ref,account_id,kind,points,occurred_at`.
                    Example row: tx-001,member-123,earn,150,2024-06-01T10:00:00Z
      responses:
        '200':
          description: Batch processed. Returns the summary counts (rejections are data, not errors).
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BatchSummary' }
        '400': { description: "Malformed upload — missing file part, or unreadable/absent CSV header.", content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /audit:
    get:
      operationId: listAudit
      summary: List recorded transaction attempts (admin only), newest-first
      tags: [audit]
      parameters:
        - name: account_id
          in: query
          required: false
          description: Optional filter — only attempts recorded against this account.
          schema: { type: string, minLength: 1, maxLength: 64, pattern: '^[A-Za-z0-9._-]+$' }
      responses:
        '200':
          description: The audit log, newest-first.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuditLog' }
        '400': { description: Malformed account_id query parameter., content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  responses:
    # Shared auth responses, referenced by every protected operation so the
    # contract documents what the Bearer requirement implies: no/bad token → 401,
    # a member reaching for another account → 403.
    Unauthorized:
      description: Missing, malformed, or invalid Bearer token.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Authenticated, but not allowed to act on this account.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        HS256-signed JWT. Carries `sub` (account_id) + `role` (member|admin). The server pins the
        algorithm to HS256 on verify (kills alg:none / RS↔HS confusion).
  schemas:
    LoginRequest:
      type: object
      additionalProperties: false
      required: [account_id, secret]
      properties:
        account_id: { type: string, minLength: 1, maxLength: 64, pattern: '^[A-Za-z0-9._-]+$', example: member-123 }
        secret:     { type: string, minLength: 1, writeOnly: true, example: demo-member-pw }
    TokenResponse:
      type: object
      additionalProperties: false
      required: [token, token_type, expires_in]
      properties:
        token:      { type: string, description: the HS256 JWT }
        token_type: { type: string, enum: [Bearer] }
        expires_in: { type: integer, description: seconds until the token expires, example: 3600 }
    NewAccount:
      type: object
      additionalProperties: false
      required: [account_id, name]
      properties:
        account_id: { type: string, minLength: 1, maxLength: 64, pattern: '^[A-Za-z0-9._-]+$', example: member-123 }
        name:       { type: string, minLength: 1, example: Rina }
        # Optional login secret. If omitted, the account exists but can't log in.
        # role is NEVER accepted here — new accounts are always 'member' (admin is seed-only).
        secret:     { type: string, minLength: 1, writeOnly: true, example: s3cr3t }
    Account:
      type: object
      additionalProperties: false
      required: [account_id, name, created_at]
      properties:
        account_id: { type: string, example: member-123 }
        name:       { type: string, example: Rina }
        created_at: { type: string, format: date-time }
    NewTransaction:
      type: object
      additionalProperties: false
      required: [ref, account_id, kind, points, occurred_at]
      properties:
        ref:         { type: string, minLength: 1, maxLength: 64, example: tx-001 }
        account_id:  { type: string, minLength: 1, maxLength: 64, pattern: '^[A-Za-z0-9._-]+$', example: member-123 }
        kind:        { type: string, enum: [earn, spend], description: "earn adds points; spend subtracts (rejected if it would go below zero)" }
        points:      { type: integer, format: int64, minimum: 1, maximum: 9223372036854775807, example: 150 }
        occurred_at: { type: string, format: date-time, example: "2024-06-01T10:00:00Z" }
    Transaction:
      type: object
      additionalProperties: false
      required: [ref, account_id, kind, points, occurred_at]
      properties:
        ref:         { type: string, example: tx-001 }
        account_id:  { type: string, example: member-123 }
        kind:        { type: string, enum: [earn, spend] }
        points:      { type: integer, format: int64, example: 150 }
        occurred_at: { type: string, format: date-time }
    Balance:
      type: object
      additionalProperties: false
      required: [account_id, balance]
      properties:
        account_id: { type: string, example: member-123 }
        balance:    { type: integer, format: int64, example: 150 }
    AccountSummary:
      type: object
      additionalProperties: false
      required: [account_id, name, role, balance]
      properties:
        account_id: { type: string, example: member-123 }
        name:       { type: string, example: Rina }
        role:       { type: string, enum: [member, admin] }
        balance:    { type: integer, format: int64, example: 150 }
    AccountList:
      type: array
      items: { $ref: '#/components/schemas/AccountSummary' }
    LedgerEntry:
      # Deliberately NO account_id — it's redundant in a per-account list, and the
      # brief's shape is exactly {ref, kind, points, occurred_at}.
      type: object
      additionalProperties: false
      required: [ref, kind, points, occurred_at]
      properties:
        ref:         { type: string, example: tx-001 }
        kind:        { type: string, enum: [earn, spend] }
        points:      { type: integer, format: int64, example: 150 }
        occurred_at: { type: string, format: date-time }
    TransactionList:
      type: array
      items: { $ref: '#/components/schemas/LedgerEntry' }
    Health:
      type: object
      additionalProperties: false
      required: [status, db]
      properties:
        status: { type: string, enum: [ok, degraded] }
        db:     { type: string, enum: [up, down] }
    AuditEntry:
      type: object
      additionalProperties: false
      required: [id, ref, account_id, kind, points, outcome, reason, created_at]
      properties:
        id:         { type: integer, format: int64, example: 1 }
        ref:        { type: string, example: tx-001 }
        account_id: { type: string, example: member-123 }
        # kind is a FREE string here (not the earn|spend enum): the audit log is a
        # faithful record of what was *attempted* — a rejected batch row (S5) may
        # carry an invalid kind, and we still record the attempt + its reason.
        kind:       { type: string, example: earn }
        points:     { type: integer, format: int64, example: 150 }
        outcome:    { type: string, enum: [accepted, rejected, duplicate] }
        reason:     { type: string, example: "ok" }
        created_at: { type: string, format: date-time }
    AuditLog:
      type: array
      items: { $ref: '#/components/schemas/AuditEntry' }
    BatchSummary:
      description: Result of a batch ingest — total rows seen and how each resolved.
      type: object
      additionalProperties: false
      required: [processed, accepted, rejected, duplicates]
      properties:
        processed:  { type: integer, format: int64, description: "total data rows seen (= accepted + rejected + duplicates)", example: 4 }
        accepted:   { type: integer, format: int64, description: "rows newly applied (created)", example: 2 }
        rejected:   { type: integer, format: int64, description: "rows refused (bad row / unknown account / would go negative)", example: 1 }
        duplicates: { type: integer, format: int64, description: "rows whose ref was already seen (idempotent replay)", example: 1 }
    Error:
      description: Single error envelope used across the whole API (RFC 9457-ish, trimmed).
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:       { type: string, description: "stable snake_case machine code" }
            message:    { type: string, description: "human-friendly, never a stack trace/SQL" }
            request_id: { type: string }
