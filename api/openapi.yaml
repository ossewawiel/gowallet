openapi: 3.0.3
info:
  title: gowallet API
  version: 0.1.0
  description: Loyalty points wallet — accounts earn/spend points with correct balances.
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness + database readiness probe
      tags: [meta]
      responses:
        '200':
          description: Service healthy and database reachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
        '503':
          description: Database unreachable.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Health' }
components:
  schemas:
    Health:
      type: object
      additionalProperties: false
      required: [status, db]
      properties:
        status: { type: string, enum: [ok, degraded] }
        db:     { type: string, enum: [up, down] }
    Error:
      description: Single error envelope used across the whole API (RFC 9457-ish, trimmed).
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message]
          properties:
            code:       { type: string, description: stable snake_case machine code }
            message:    { type: string, description: human-friendly, never a stack trace/SQL }
            request_id: { type: string }
